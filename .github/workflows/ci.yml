# .github/workflows/ci.yml
name: CI

on:
  push:
    branches-ignore: []   # all branches
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # On non-PR pushes run only ubuntu-latest; on PRs to main run the full 3-OS matrix
    if: github.event_name == 'pull_request' || matrix.os == 'ubuntu-latest'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # --- Rust toolchain ---
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4305c38b25b97a56b7ead356f2a1d7d9ef993260 # stable (2024-11-01)
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5
        with:
          workspaces: src-tauri

      # --- Node / pnpm ---
      - name: Install pnpm
        uses: pnpm/action-setup@a3252b01235470b1af1eecfd42a25700cb7f695e # v4.1.0
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: pnpm

      # --- Linux system deps for Tauri (WebKit) ---
      - name: Install Tauri system deps (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # --- Lint and type checks ---
      - name: Biome lint (JS/TS)
        run: pnpm lint:ci

      - name: TypeScript typecheck
        run: pnpm typecheck

      - name: rustfmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      # --- Tests ---
      - name: Frontend tests (Vitest)
        run: pnpm test

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      # --- Bindings freshness ---
      - name: Regenerate ts-rs bindings
        run: pnpm bindings

      - name: Assert bindings unchanged
        run: git diff --exit-code src/ipc/bindings.ts
